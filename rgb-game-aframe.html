<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGB ARENA — 3D Color Lab</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      cursor: none;
    }

    #custom-cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, border-color 0.15s;
      mix-blend-mode: difference;
    }

    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(0,0,0,0.75);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
    }

    #hud-title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: 0.15em;
      color: #fff;
    }

    #hud-title span {
      color: #FF2222;
    }

    #hud-color-display {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #color-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: rgb(0,0,0);
      transition: background 0.3s ease;
    }

    #color-values {
      font-size: 13px;
      line-height: 1.6;
    }

    #rgb-text { color: #aaa; }
    #hex-text { color: #fff; font-size: 15px; font-weight: bold; letter-spacing: 0.1em; }

    #score-area {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    #score-label { font-size: 11px; color: #555; letter-spacing: 0.2em; text-transform: uppercase; }
    #score-value { font-family: 'Orbitron', sans-serif; font-size: 22px; color: #FFD700; font-weight: 700; }

    #bottom-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      padding: 14px 20px;
      background: rgba(0,0,0,0.75);
      border-top: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
    }

    .channel-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .channel-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #666;
    }

    .channel-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid;
      background: transparent;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: none;
      transition: transform 0.1s ease, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .channel-btn:hover {
      transform: scale(1.12);
    }
    .channel-btn:active { transform: scale(0.95); }

    .btn-r { border-color: #FF4444; color: #FF4444; }
    .btn-r:hover { box-shadow: 0 0 18px rgba(255,68,68,0.5); }
    .btn-g { border-color: #44FF44; color: #44FF44; }
    .btn-g:hover { box-shadow: 0 0 18px rgba(68,255,68,0.5); }
    .btn-b { border-color: #4488FF; color: #4488FF; }
    .btn-b:hover { box-shadow: 0 0 18px rgba(68,136,255,0.5); }

    .channel-val {
      font-size: 13px;
      min-width: 40px;
      text-align: center;
    }
    .val-r { color: #FF4444; }
    .val-g { color: #44FF44; }
    .val-b { color: #4488FF; }

    .shape-btns {
      display: flex;
      gap: 8px;
      margin: 0 24px;
    }

    .shape-btn {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.5);
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      cursor: none;
      transition: all 0.15s;
      border-radius: 4px;
    }

    .shape-btn:hover { border-color: #fff; color: #fff; }
    .shape-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.08); }

    #mission-panel {
      position: fixed;
      top: 72px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 14px 18px;
      min-width: 200px;
      backdrop-filter: blur(8px);
    }

    #mission-title {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: #555;
      margin-bottom: 10px;
    }

    #target-swatch {
      width: 100%;
      height: 32px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 8px;
      transition: background 0.4s ease;
    }

    #target-label {
      font-size: 11px;
      color: #777;
      margin-bottom: 12px;
    }

    #match-bar-wrap {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    #match-bar {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      background: #FFD700;
      transition: width 0.3s ease, background 0.3s;
    }

    #match-pct {
      font-size: 12px;
      color: #aaa;
      text-align: right;
    }

    #combo-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #FFD700;
      z-index: 200;
      pointer-events: none;
      text-shadow: 0 0 30px rgba(255,215,0,0.6);
      transition: none;
    }

    #instructions {
      position: fixed;
      bottom: 100px;
      left: 20px;
      z-index: 100;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      line-height: 2;
    }

    a-scene { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; }

    @keyframes flash-anim {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      40% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="custom-cursor"></div>

<div id="hud">
  <div id="hud-title">RGB<span>//</span>ARENA</div>
  <div id="hud-color-display">
    <div id="color-swatch"></div>
    <div id="color-values">
      <div id="rgb-text">rgb(0, 0, 0)</div>
      <div id="hex-text">#000000</div>
    </div>
  </div>
  <div id="score-area">
    <div id="score-label">pontuação</div>
    <div id="score-value">0</div>
  </div>
</div>

<div id="mission-panel">
  <div id="mission-title">▸ MISSÃO ATUAL</div>
  <div id="target-swatch"></div>
  <div id="target-label">combine a cor alvo</div>
  <div id="match-bar-wrap"><div id="match-bar"></div></div>
  <div id="match-pct">0%</div>
</div>

<div id="combo-flash">PERFEITO!</div>

<div id="instructions">
  drag → orbit &nbsp;|&nbsp; scroll → zoom
</div>

<div id="bottom-panel">
  <div class="channel-block">
    <div class="channel-label">RED</div>
    <button class="channel-btn btn-r" onclick="incrementChannel('r')">R+</button>
    <div class="channel-val val-r" id="val-r">0</div>
  </div>
  <div class="channel-block">
    <div class="channel-label">GREEN</div>
    <button class="channel-btn btn-g" onclick="incrementChannel('g')">G+</button>
    <div class="channel-val val-g" id="val-g">0</div>
  </div>
  <div class="channel-block">
    <div class="channel-label">BLUE</div>
    <button class="channel-btn btn-b" onclick="incrementChannel('b')">B+</button>
    <div class="channel-val val-b" id="val-b">0</div>
  </div>

  <div class="shape-btns">
    <button class="shape-btn active" onclick="setShape('box', this)">CUBO</button>
    <button class="shape-btn" onclick="setShape('sphere', this)">ESFERA</button>
    <button class="shape-btn" onclick="setShape('cylinder', this)">CILINDRO</button>
    <button class="shape-btn" onclick="setShape('torus', this)">TORUS</button>
  </div>

  <div class="channel-block">
    <div class="channel-label">RESET</div>
    <button class="channel-btn" style="border-color:#888; color:#888; font-size:18px;" onclick="resetColor()">↺</button>
    <div class="channel-val" style="color:#888; font-size:11px;">zerar</div>
  </div>
</div>

<a-scene background="color: #050508" renderer="antialias: true; colorManagement: true" vr-mode-ui="enabled: false" embedded>

  <a-entity id="rig" position="0 1.5 5">
    <a-camera look-controls="enabled: false" wasd-controls="enabled: false" fov="60">
    </a-camera>
  </a-entity>

  <a-entity id="objeto-alvo"
            geometry="primitive: box; width: 1.4; height: 1.4; depth: 1.4"
            position="0 1.5 0"
            material="color: rgb(0,0,0); roughness: 0.2; metalness: 0.6"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
            animation__float="property: position; to: 0 1.9 0; dir: alternate; loop: true; dur: 3000; easing: easeInOutSine">
  </a-entity>

  <a-entity id="shadow-plane"
            geometry="primitive: plane; width: 6; height: 6"
            rotation="-90 0 0"
            position="0 -0.02 0"
            material="color: #0a0a12; roughness: 1; metalness: 0">
  </a-entity>

  <a-entity id="ring1"
            geometry="primitive: torus; radius: 2.2; radiusTubular: 0.015; segmentsRadial: 80"
            rotation="90 0 0"
            position="0 1.5 0"
            material="color: #222244; roughness: 1"
            animation="property: rotation; to: 90 360 0; loop: true; dur: 20000; easing: linear">
  </a-entity>

  <a-entity id="ring2"
            geometry="primitive: torus; radius: 2.6; radiusTubular: 0.015; segmentsRadial: 80"
            rotation="30 0 0"
            position="0 1.5 0"
            material="color: #442222; roughness: 1"
            animation="property: rotation; to: -330 360 0; loop: true; dur: 28000; easing: linear">
  </a-entity>

  <a-light type="ambient" color="#ffffff" intensity="0.3"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0.8" position="3 5 2"></a-light>
  <a-light type="point" color="#0044ff" intensity="0.4" position="-3 2 1"></a-light>
  <a-light type="point" color="#ff2200" intensity="0.4" position="3 2 -1"></a-light>

  <a-entity id="particle-group" position="0 1.5 0">
    <a-entity geometry="primitive: sphere; radius: 0.04" position="2.5 0.8 0.3" material="color: #223366; roughness:1" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 0.03" position="-2.2 -0.5 0.8" material="color: #442200; roughness:1" animation="property: rotation; to: 0 -360 0; loop: true; dur: 8000"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 0.05" position="0.5 2.2 -2" material="color: #224422; roughness:1" animation="property: rotation; to: 0 360 0; loop: true; dur: 11000"></a-entity>
    <a-entity geometry="primitive: sphere; radius: 0.03" position="-1.8 1.6 1.5" material="color: #333300; roughness:1" animation="property: rotation; to: 0 -360 0; loop: true; dur: 7000"></a-entity>
  </a-entity>

  <a-text id="info-text" value="RGB: 0, 0, 0" position="-1.8 -0.3 0" scale="0.5 0.5 0.5" color="#334466" align="left"></a-text>

</a-scene>

<script>
  const cursor = document.getElementById('custom-cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  let rgbAtual = { r: 0, g: 0, b: 0 };
  let score = 0;
  let targetColor = { r: 0, g: 0, b: 0 };

  const STEPS = [0, 2, 4, 8, 16, 32, 64, 128, 255];

  function nextStep(v) {
    const idx = STEPS.indexOf(v);
    if (idx === -1 || idx === STEPS.length - 1) return 0;
    return STEPS[idx + 1];
  }

  function toHex(v) { return v.toString(16).padStart(2, '0').toUpperCase(); }

  function colorDistance(a, b) {
    const dr = a.r - b.r, dg = a.g - b.g, db = a.b - b.b;
    return Math.sqrt(dr*dr + dg*dg + db*db);
  }

  function matchPercent() {
    const maxDist = Math.sqrt(3 * 255 * 255);
    const dist = colorDistance(rgbAtual, targetColor);
    return Math.max(0, Math.round((1 - dist / maxDist) * 100));
  }

  function newTarget() {
    const validVals = [0, 2, 4, 8, 16, 32, 64, 128, 255];
    targetColor.r = validVals[Math.floor(Math.random() * validVals.length)];
    targetColor.g = validVals[Math.floor(Math.random() * validVals.length)];
    targetColor.b = validVals[Math.floor(Math.random() * validVals.length)];
    document.getElementById('target-swatch').style.background =
      `rgb(${targetColor.r},${targetColor.g},${targetColor.b})`;
  }

  function updateUI() {
    const { r, g, b } = rgbAtual;
    const colorStr = `rgb(${r},${g},${b})`;
    const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;

    const obj = document.querySelector('#objeto-alvo');
    if (obj) obj.setAttribute('material', `color: ${colorStr}; roughness: 0.2; metalness: 0.6`);

    document.getElementById('color-swatch').style.background = colorStr;
    document.getElementById('rgb-text').textContent = `rgb(${r}, ${g}, ${b})`;
    document.getElementById('hex-text').textContent = hex;
    document.getElementById('val-r').textContent = r;
    document.getElementById('val-g').textContent = g;
    document.getElementById('val-b').textContent = b;

    const infoText = document.querySelector('#info-text');
    if (infoText) infoText.setAttribute('value', `R:${r}  G:${g}  B:${b}`);

    const pct = matchPercent();
    const bar = document.getElementById('match-bar');
    bar.style.width = pct + '%';
    bar.style.background = pct >= 90 ? '#00ff88' : pct >= 60 ? '#FFD700' : '#FF4444';
    document.getElementById('match-pct').textContent = pct + '%';

    if (pct >= 95) {
      const gained = Math.round(pct * 10);
      score += gained;
      document.getElementById('score-value').textContent = score;
      showCombo('PERFEITO! +' + gained);
      setTimeout(newTarget, 1200);
    } else if (pct >= 80) {
      const gained = Math.round(pct * 3);
      score += gained;
      document.getElementById('score-value').textContent = score;
    }
  }

  function showCombo(text) {
    const el = document.getElementById('combo-flash');
    el.textContent = text;
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'flash-anim 1.1s ease-out forwards';
  }

  function incrementChannel(canal) {
    rgbAtual[canal] = nextStep(rgbAtual[canal]);
    updateUI();
  }

  function resetColor() {
    rgbAtual = { r: 0, g: 0, b: 0 };
    updateUI();
  }

  function setShape(shape, btn) {
    const obj = document.querySelector('#objeto-alvo');
    if (!obj) return;

    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    let geoStr = `primitive: ${shape}`;
    if (shape === 'box') geoStr += '; width: 1.4; height: 1.4; depth: 1.4';
    if (shape === 'sphere') geoStr += '; radius: 0.8';
    if (shape === 'cylinder') geoStr += '; radius: 0.7; height: 1.4';
    if (shape === 'torus') geoStr += '; radius: 0.8; radiusTubular: 0.25';

    obj.setAttribute('geometry', geoStr);
  }

  let isDragging = false, lastX = 0, lastY = 0;
  let camYaw = 0, camPitch = 15;
  let camDist = 5;

  document.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    isDragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
  });

  document.addEventListener('mouseup', () => { isDragging = false; });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    camYaw -= dx * 0.5;
    camPitch = Math.max(-30, Math.min(60, camPitch + dy * 0.3));
    lastX = e.clientX;
    lastY = e.clientY;
    updateCamera();
  });

  document.addEventListener('wheel', e => {
    camDist = Math.max(2.5, Math.min(10, camDist + e.deltaY * 0.01));
    updateCamera();
  });

  function updateCamera() {
    const rig = document.querySelector('#rig');
    if (!rig) return;
    const rad = camYaw * Math.PI / 180;
    const pitchRad = camPitch * Math.PI / 180;
    const x = camDist * Math.sin(rad) * Math.cos(pitchRad);
    const y = 1.5 + camDist * Math.sin(pitchRad);
    const z = camDist * Math.cos(rad) * Math.cos(pitchRad);
    rig.setAttribute('position', `${x} ${y} ${z}`);
    rig.setAttribute('rotation', `${-camPitch} ${-camYaw} 0`);
  }

  document.addEventListener('DOMContentLoaded', () => {
    newTarget();
    updateUI();
    updateCamera();
  });

  setTimeout(() => {
    newTarget();
    updateUI();
    updateCamera();
  }, 800);
</script>
</body>
</html>
