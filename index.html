<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>RGB ARENA</title>

  <!-- A-Frame sempre primeiro -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- AR.js carregado dinamicamente só no mobile -->

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      touch-action: none;
    }

    /* ── cursor desktop ── */
    #custom-cursor {
      position: fixed;
      width: 20px; height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      mix-blend-mode: difference;
      transition: transform 0.1s;
    }
    body.is-mobile #custom-cursor { display: none; }
    body:not(.is-mobile) { cursor: none; }

    /* ── HUD topo ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
      background: rgba(0,0,0,0.72);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
    }
    #hud-title {
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      font-size: 15px; letter-spacing: 0.14em; color: #fff;
    }
    #hud-title span { color: #FF2222; }

    #hud-center {
      display: flex; align-items: center; gap: 12px;
    }
    #color-swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgb(0,0,0);
      transition: background 0.3s;
    }
    #color-values { font-size: 11px; line-height: 1.55; }
    #rgb-text { color: #888; }
    #hex-text { color: #fff; font-size: 13px; font-weight: bold; letter-spacing: 0.08em; }

    #score-area { text-align: right; }
    #score-label { font-size: 9px; color: #444; letter-spacing: 0.2em; }
    #score-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px; color: #FFD700; font-weight: 700;
    }

    /* ── painel missão (canto superior esq no desktop, embaixo do HUD no mobile) ── */
    #mission-panel {
      position: fixed; z-index: 200;
      background: rgba(0,0,0,0.78);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px; padding: 12px 16px;
      backdrop-filter: blur(10px);
    }
    body:not(.is-mobile) #mission-panel { top: 68px; right: 18px; min-width: 190px; }
    body.is-mobile  #mission-panel {
      top: 58px; left: 10px; right: 10px; min-width: unset;
      display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    }

    #mission-title {
      font-size: 9px; letter-spacing: 0.22em; color: #444;
      margin-bottom: 8px;
    }
    body.is-mobile #mission-title { margin-bottom: 0; white-space: nowrap; }

    #target-swatch {
      width: 100%; height: 28px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      margin-bottom: 7px; transition: background 0.4s;
    }
    body.is-mobile #target-swatch { width: 44px; height: 44px; border-radius: 6px; flex-shrink: 0; margin-bottom: 0; }

    #mission-info { flex: 1; }
    #target-label { font-size: 10px; color: #666; margin-bottom: 10px; }
    body.is-mobile #target-label { margin-bottom: 4px; font-size: 9px; }

    #match-bar-wrap {
      height: 5px; background: rgba(255,255,255,0.07);
      border-radius: 3px; overflow: hidden; margin-bottom: 5px;
    }
    #match-bar {
      height: 100%; width: 0%; border-radius: 3px;
      background: #FFD700; transition: width 0.3s, background 0.3s;
    }
    #match-pct { font-size: 10px; color: #888; text-align: right; }

    /* ── painel inferior — controles ── */
    #bottom-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(0,0,0,0.78);
      border-top: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      padding: 10px 16px 12px;
    }

    /* desktop: tudo numa linha */
    body:not(.is-mobile) #bottom-panel {
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    /* mobile: duas linhas */
    body.is-mobile #bottom-panel {
      display: grid;
      grid-template-rows: auto auto;
      gap: 10px;
    }

    /* linha dos canais RGB */
    #rgb-row {
      display: flex; justify-content: center; gap: 18px; align-items: center;
    }
    .channel-block { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .channel-label { font-size: 9px; letter-spacing: 0.2em; color: #555; }
    .channel-btn {
      border-radius: 50%; border: 2px solid;
      background: transparent;
      font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 0.04em;
      transition: transform 0.1s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent; cursor: pointer;
    }
    body:not(.is-mobile) .channel-btn { width: 52px; height: 52px; font-size: 11px; cursor: none; }
    body.is-mobile      .channel-btn { width: 64px; height: 64px; font-size: 13px; }
    .channel-btn:active { transform: scale(0.92); }
    .btn-r { border-color: #FF4444; color: #FF4444; }
    .btn-r:active { box-shadow: 0 0 16px rgba(255,68,68,0.6); }
    .btn-g { border-color: #44FF44; color: #44FF44; }
    .btn-g:active { box-shadow: 0 0 16px rgba(68,255,68,0.6); }
    .btn-b { border-color: #4488FF; color: #4488FF; }
    .btn-b:active { box-shadow: 0 0 16px rgba(68,136,255,0.6); }
    .channel-val { font-size: 12px; min-width: 36px; text-align: center; }
    .val-r { color: #FF4444; } .val-g { color: #44FF44; } .val-b { color: #4488FF; }

    /* linha das formas + reset */
    #shape-row {
      display: flex; justify-content: center; gap: 7px; align-items: center;
    }
    .shape-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.45);
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.08em;
      border-radius: 4px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    body:not(.is-mobile) .shape-btn { padding: 9px 16px; font-size: 11px; cursor: none; }
    body.is-mobile      .shape-btn { padding: 8px 12px; font-size: 10px; }
    .shape-btn.active { border-color: #FFD700; color: #FFD700; background: rgba(255,215,0,0.07); }

    .reset-btn {
      border-color: #555; color: #666; font-size: 18px !important;
      padding: 0 !important; display: flex; align-items: center; justify-content: center;
    }
    body:not(.is-mobile) .reset-btn { width: 42px; height: 42px; border-radius: 50%; cursor: none; }
    body.is-mobile      .reset-btn { width: 40px; height: 40px; border-radius: 50%; }

    /* ── AR badge mobile ── */
    #ar-badge {
      position: fixed; top: 112px; left: 10px; right: 10px; z-index: 200;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,200,0,0.2);
      border-radius: 6px; padding: 7px 12px;
      font-size: 10px; color: #FFD700; text-align: center;
      letter-spacing: 0.1em;
      display: none;
    }
    body.is-mobile #ar-badge { display: block; }

    /* ── instrução desktop ── */
    #instructions {
      position: fixed; bottom: 84px; left: 18px; z-index: 200;
      font-size: 10px; color: rgba(255,255,255,0.2); line-height: 2;
    }
    body.is-mobile #instructions { display: none; }

    /* ── combo flash ── */
    #combo-flash {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%,-50%) scale(0);
      font-family: 'Orbitron', sans-serif; font-weight: 900;
      color: #FFD700; z-index: 300; pointer-events: none;
    }
    body:not(.is-mobile) #combo-flash { font-size: 44px; }
    body.is-mobile      #combo-flash { font-size: 28px; }

    @keyframes flash-anim {
      0%   { transform: translate(-50%,-50%) scale(0);   opacity: 1; }
      40%  { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
      80%  { transform: translate(-50%,-50%) scale(1);    opacity: 0.5; }
      100% { transform: translate(-50%,-50%) scale(1.2);  opacity: 0; }
    }

    a-scene { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="custom-cursor"></div>

<!-- HUD -->
<div id="hud">
  <div id="hud-title">RGB<span>//</span>ARENA</div>
  <div id="hud-center">
    <div id="color-swatch"></div>
    <div id="color-values">
      <div id="rgb-text">rgb(0,0,0)</div>
      <div id="hex-text">#000000</div>
    </div>
  </div>
  <div id="score-area">
    <div id="score-label">PONTOS</div>
    <div id="score-value">0</div>
  </div>
</div>

<!-- Missão -->
<div id="mission-panel">
  <div id="mission-title">▸ MISSÃO</div>
  <div id="target-swatch"></div>
  <div id="mission-info">
    <div id="target-label">combine a cor alvo</div>
    <div id="match-bar-wrap"><div id="match-bar"></div></div>
    <div id="match-pct">0%</div>
  </div>
</div>

<!-- AR hint (só mobile) -->
<div id="ar-badge">📷 APONTE PARA O MARCADOR HIRO</div>

<!-- Combo -->
<div id="combo-flash"></div>

<!-- Instrução desktop -->
<div id="instructions">
  arrastar → orbitar &nbsp;|&nbsp; scroll → zoom
</div>

<!-- Controles -->
<div id="bottom-panel">
  <div id="rgb-row">
    <div class="channel-block">
      <div class="channel-label">RED</div>
      <button class="channel-btn btn-r" onclick="incrementChannel('r')">R+</button>
      <div class="channel-val val-r" id="val-r">0</div>
    </div>
    <div class="channel-block">
      <div class="channel-label">GREEN</div>
      <button class="channel-btn btn-g" onclick="incrementChannel('g')">G+</button>
      <div class="channel-val val-g" id="val-g">0</div>
    </div>
    <div class="channel-block">
      <div class="channel-label">BLUE</div>
      <button class="channel-btn btn-b" onclick="incrementChannel('b')">B+</button>
      <div class="channel-val val-b" id="val-b">0</div>
    </div>
  </div>

  <div id="shape-row">
    <button class="shape-btn active" onclick="setShape('box',this)">CUBO</button>
    <button class="shape-btn" onclick="setShape('sphere',this)">ESFERA</button>
    <button class="shape-btn" onclick="setShape('cylinder',this)">CILINDRO</button>
    <button class="shape-btn" onclick="setShape('torus',this)">TORUS</button>
    <button class="shape-btn reset-btn" onclick="resetColor()" title="Zerar">↺</button>
  </div>
</div>

<!-- ══════════════ A-SCENE ══════════════
     O atributo arjs é injetado só em mobile via JS.
     Em desktop: cena 3D normal com câmera orbital.
     Em mobile: AR.js + a-marker Hiro.
─────────────────────────────────────── -->
<a-scene id="main-scene"
         renderer="antialias: true; colorManagement: true"
         vr-mode-ui="enabled: false"
         embedded>

  <!-- ── CONTEÚDO 3D comum: fica dentro do marker no AR, ou solto no desktop ── -->
  <!-- Preenchido por JS após detecção de ambiente -->

</a-scene>

<script>
/* ══════════════════════════════════════════════
   1. DETECÇÃO DE AMBIENTE
══════════════════════════════════════════════ */
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
              || (navigator.maxTouchPoints > 1 && /Mac/.test(navigator.platform)); // iPad

if (isMobile) document.body.classList.add('is-mobile');

/* ══════════════════════════════════════════════
   2. ESTADO DO JOGO
══════════════════════════════════════════════ */
let rgbAtual = { r: 0, g: 0, b: 0 };
let score    = 0;
let targetColor = { r: 0, g: 0, b: 0 };
let matchLocked = false; // evita pontuação dupla enquanto anima

const STEPS = [0, 2, 4, 8, 16, 32, 64, 128, 255];

function nextStep(v) {
  const idx = STEPS.indexOf(v);
  if (idx < 0 || idx === STEPS.length - 1) return 0;
  return STEPS[idx + 1];
}
function toHex(v) { return v.toString(16).padStart(2,'0').toUpperCase(); }
function colorDist(a, b) {
  const dr = a.r-b.r, dg = a.g-b.g, db = a.b-b.b;
  return Math.sqrt(dr*dr + dg*dg + db*db);
}
function matchPct() {
  const max = Math.sqrt(3*255*255);
  return Math.max(0, Math.round((1 - colorDist(rgbAtual, targetColor)/max)*100));
}

/* ══════════════════════════════════════════════
   3. MISSÃO
══════════════════════════════════════════════ */
function newTarget() {
  const v = [0,2,4,8,16,32,64,128,255];
  targetColor.r = v[Math.floor(Math.random()*v.length)];
  targetColor.g = v[Math.floor(Math.random()*v.length)];
  targetColor.b = v[Math.floor(Math.random()*v.length)];
  document.getElementById('target-swatch').style.background =
    `rgb(${targetColor.r},${targetColor.g},${targetColor.b})`;
  matchLocked = false;
}

/* ══════════════════════════════════════════════
   4. UPDATE UI + 3D
══════════════════════════════════════════════ */
function updateUI() {
  const {r,g,b} = rgbAtual;
  const cs  = `rgb(${r},${g},${b})`;
  const hex = `#${toHex(r)}${toHex(g)}${toHex(b)}`;

  // objeto 3D
  const obj = document.querySelector('#objeto-alvo');
  if (obj) obj.setAttribute('material', `color:${cs}; roughness:0.2; metalness:0.6`);

  // HUD
  document.getElementById('color-swatch').style.background = cs;
  document.getElementById('rgb-text').textContent = `rgb(${r},${g},${b})`;
  document.getElementById('hex-text').textContent = hex;
  document.getElementById('val-r').textContent = r;
  document.getElementById('val-g').textContent = g;
  document.getElementById('val-b').textContent = b;

  // missão
  const pct = matchPct();
  const bar = document.getElementById('match-bar');
  bar.style.width = pct+'%';
  bar.style.background = pct>=90?'#00ff88': pct>=60?'#FFD700':'#FF4444';
  document.getElementById('match-pct').textContent = pct+'%';

  // pontuação
  if (!matchLocked && pct >= 95) {
    matchLocked = true;
    const pts = Math.round(pct * 10);
    score += pts;
    document.getElementById('score-value').textContent = score;
    showCombo('PERFEITO! +'+pts);
    setTimeout(newTarget, 1400);
  } else if (!matchLocked && pct >= 80) {
    const pts = Math.round(pct * 1.5);
    score += pts;
    document.getElementById('score-value').textContent = score;
  }
}

function showCombo(txt) {
  const el = document.getElementById('combo-flash');
  el.textContent = txt;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'flash-anim 1.1s ease-out forwards';
}

/* ══════════════════════════════════════════════
   5. INTERAÇÃO
══════════════════════════════════════════════ */
function incrementChannel(c) { rgbAtual[c] = nextStep(rgbAtual[c]); updateUI(); }
function resetColor() { rgbAtual={r:0,g:0,b:0}; updateUI(); }

function setShape(shape, btn) {
  const obj = document.querySelector('#objeto-alvo');
  if (!obj) return;
  document.querySelectorAll('.shape-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const map = {
    box:      'primitive:box; width:1.4; height:1.4; depth:1.4',
    sphere:   'primitive:sphere; radius:0.8',
    cylinder: 'primitive:cylinder; radius:0.7; height:1.4',
    torus:    'primitive:torus; radius:0.8; radiusTubular:0.25'
  };
  obj.setAttribute('geometry', map[shape]);
}

/* ══════════════════════════════════════════════
   6. CÂMERA ORBITAL (desktop)
══════════════════════════════════════════════ */
let isDragging=false, lastX=0, lastY=0, camYaw=0, camPitch=18, camDist=5;

function updateCamera() {
  const rig = document.querySelector('#rig');
  if (!rig) return;
  const r = camYaw * Math.PI/180, p = camPitch * Math.PI/180;
  rig.setAttribute('position',
    `${camDist*Math.sin(r)*Math.cos(p)} ${1.5+camDist*Math.sin(p)} ${camDist*Math.cos(r)*Math.cos(p)}`);
  rig.setAttribute('rotation', `${-camPitch} ${-camYaw} 0`);
}

if (!isMobile) {
  // cursor
  const cursor = document.getElementById('custom-cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX+'px';
    cursor.style.top  = e.clientY+'px';
  });

  document.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    isDragging=true; lastX=e.clientX; lastY=e.clientY;
  });
  document.addEventListener('mouseup', () => isDragging=false);
  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    camYaw   -= (e.clientX-lastX)*0.5;
    camPitch  = Math.max(-30, Math.min(60, camPitch+(e.clientY-lastY)*0.3));
    lastX=e.clientX; lastY=e.clientY;
    updateCamera();
  });
  document.addEventListener('wheel', e => {
    camDist = Math.max(2.5, Math.min(10, camDist+e.deltaY*0.01));
    updateCamera();
  });
}

/* ══════════════════════════════════════════════
   7. CONSTRUÇÃO DA CENA A-FRAME (após detecção)
══════════════════════════════════════════════ */
function buildScene() {
  const scene = document.getElementById('main-scene');

  /* ── entidades 3D do objeto do jogo ── */
  const objHTML = `
    <a-entity id="objeto-alvo"
      geometry="primitive:box; width:1.4; height:1.4; depth:1.4"
      position="0 1 0"
      material="color:rgb(0,0,0); roughness:0.2; metalness:0.6"
      animation="property:rotation; to:0 360 0; loop:true; dur:10000; easing:linear"
      animation__float="property:position; to:0 1.4 0; dir:alternate; loop:true; dur:3000; easing:easeInOutSine">
    </a-entity>`;

  if (isMobile) {
    /* ── MODO AR ──
       Adiciona arjs à cena e injeta o marker Hiro com o objeto dentro.
       O script AR.js é carregado dinamicamente para não afetar o desktop. */
    scene.setAttribute('arjs', 'sourceType:webcam; debugUIEnabled:false; detectionMode:mono_and_matrix; matrixCodeType:3x3;');

    const marker = document.createElement('a-marker');
    marker.setAttribute('preset', 'hiro');
    marker.innerHTML = objHTML;
    scene.appendChild(marker);

    // câmera AR
    const camAR = document.createElement('a-entity');
    camAR.setAttribute('camera', '');
    scene.appendChild(camAR);

  } else {
    /* ── MODO DESKTOP ──
       Cena 3D normal: plano de chão, anéis decorativos, luzes, câmera orbital. */
    scene.setAttribute('background', 'color:#050508');

    scene.innerHTML = `
      <a-entity id="rig" position="0 1.5 5">
        <a-camera look-controls="enabled:false" wasd-controls="enabled:false" fov="60"></a-camera>
      </a-entity>

      ${objHTML}

      <a-entity geometry="primitive:plane; width:8; height:8"
        rotation="-90 0 0" position="0 -0.02 0"
        material="color:#080812; roughness:1; metalness:0">
      </a-entity>

      <a-entity geometry="primitive:torus; radius:2.2; radiusTubular:0.014; segmentsRadial:80"
        rotation="90 0 0" position="0 1 0"
        material="color:#1a1a33; roughness:1"
        animation="property:rotation; to:90 360 0; loop:true; dur:20000; easing:linear">
      </a-entity>

      <a-entity geometry="primitive:torus; radius:2.7; radiusTubular:0.014; segmentsRadial:80"
        rotation="30 0 0" position="0 1 0"
        material="color:#331a1a; roughness:1"
        animation="property:rotation; to:-330 360 0; loop:true; dur:28000; easing:linear">
      </a-entity>

      <a-light type="ambient"     color="#ffffff" intensity="0.3"></a-light>
      <a-light type="directional" color="#ffffff" intensity="0.8" position="3 5 2"></a-light>
      <a-light type="point"       color="#0044ff" intensity="0.4" position="-3 2 1"></a-light>
      <a-light type="point"       color="#ff2200" intensity="0.4" position="3 2 -1"></a-light>
    `;

    updateCamera();
  }
}

/* ══════════════════════════════════════════════
   8. INICIALIZAÇÃO
══════════════════════════════════════════════ */
function init() {
  if (isMobile) {
    // carrega AR.js dinamicamente
    const arScript = document.createElement('script');
    arScript.src = 'https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js';
    arScript.onload = () => { buildScene(); start(); };
    document.head.appendChild(arScript);
  } else {
    buildScene();
    start();
  }
}

function start() {
  newTarget();
  updateUI();
  if (!isMobile) updateCamera();
}

// aguarda A-Frame estar pronto
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
</html>
